default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: scheduler_app_development
  username: postgres         # Replace with your PostgreSQL username if different
  password: super09#   # Add your PostgreSQL password here (or leave blank if none)

test:
  <<: *default
  database: scheduler_app_test
  username: postgres         # Replace with your PostgreSQL username if different
  password: super09#   # Add your PostgreSQL password here (or leave blank if none)

production:
  primary: &primary_production
    <<: *default
    database: scheduler_app_production
    username: scheduler_app
    password: <%= ENV["SCHEDULER_APP_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: scheduler_app_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: scheduler_app_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: scheduler_app_production_cable
    migrations_paths: db/cable_migrate
